name: CI
run-name: CI ${{ github.event.pull_request.title }}

on:
  pull_request:

concurrency:
  group: ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  discover-tests:
    runs-on: ubuntu-latest
    outputs:
      test-projects: ${{ steps.find-tests.outputs.projects }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8
            9
            10

      - name: Find test projects
        id: find-tests
        run: |
          projects=$(find ./test -name "*Tests.csproj" -type f | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "projects=$projects" >> $GITHUB_OUTPUT
          echo "Found test projects:"
          echo "$projects" | jq -r '.[]'
        shell: bash

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8
            9
            10

      - name: Build projects
        run: dotnet build ./all.csproj
        shell: bash

  tests:
    needs: [discover-tests]
    name: Test ${{ matrix.project }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJson(needs.discover-tests.outputs.test-projects) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8
            9
            10

      - name: Docker Information
        run: |
          echo -e "\n\033[0;34mDocker System Info \033[0m"
          docker system info
          echo -e "\n\033[0;34mDocker Containers \033[0m"
          docker ps -a
        shell: bash

      - name: Run tests for ${{ matrix.project }}
        run: dotnet test ${{ matrix.project }}
        shell: bash